<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Deepfake Detection</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<main class="container py-5">
		<div class="app-shell mx-auto">
			<div class="text-center mb-4">
				<h1 class="fw-bold mb-2">Deepfake Detection</h1>
				<p class="text-secondary mb-0">Upload an image to analyze whether it is REAL or FAKE.</p>
			</div>

			<section class="card shadow-sm border-0 mb-4">
				<div class="card-body p-4 p-md-5">
					<div id="uploadZone" class="upload-zone mb-4" role="button" tabindex="0" aria-label="Upload image by drag and drop or file picker">
						<h2 class="h5 mb-2">Drag and Drop Image Here</h2>
						<p class="text-secondary mb-0">or use the file input button below</p>
					</div>

					<input id="imageInput" type="file" accept="image/*" class="d-none" aria-hidden="true">

					<div class="d-flex flex-wrap gap-2 justify-content-center mb-2">
						<button id="chooseFileBtn" type="button" class="btn btn-outline-primary">Choose Image</button>
						<button id="analyzeBtn" type="button" class="btn btn-primary" disabled>Run Detection</button>
					</div>

					<div id="fileMeta" class="file-meta text-center"></div>

					<div id="loadingState" class="d-none mt-3 text-center" aria-live="polite">
						<div class="spinner-border spinner-custom text-primary" role="status" aria-hidden="true"></div>
						<div class="mt-2 text-secondary">Analyzing image...</div>
					</div>
				</div>
			</section>

			<section id="resultCard" class="card border-0 shadow-sm d-none" aria-live="polite">
				<div class="card-body p-4 p-md-5">
					<h3 class="h4 mb-4">Detection Results</h3>

					<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
						<span class="text-secondary">Final Verdict</span>
						<span id="finalVerdict" class="verdict">-</span>
					</div>

					<div class="mb-2 d-flex justify-content-between">
						<span class="text-secondary">Confidence</span>
						<strong id="confidenceText">0%</strong>
					</div>
					<div class="progress verdict-progress mb-4" role="progressbar" aria-label="Confidence level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
						<div id="confidenceBar" class="progress-bar" style="width: 0%;">0%</div>
					</div>

					<div class="table-responsive">
						<table class="table table-striped align-middle mb-0 results-table">
							<thead>
								<tr>
									<th scope="col">Model</th>
									<th scope="col" class="text-end">Prediction Confidence</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td>EfficientNet-B4</td>
									<td id="efficientnetValue" class="text-end">-</td>
								</tr>
								<tr>
									<td>Xception</td>
									<td id="xceptionValue" class="text-end">-</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</section>
		</div>
	</main>

	<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
